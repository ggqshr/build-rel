name: Build - macOS
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      name:
        required: true
        type: string
      author:
        required: true
        type: string
      image_url:
        required: false
        type: string
        default: ''
      version_str:
        required: true
        type: string

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: 'esports/esports_moonlight_qt6'
          github-server-url: 'https://gitea.vimaxai.com:11129'
          token: ${{ secrets.GITEA_TOKEN }}
          ref: ${{ inputs.branch }}
          submodules: 'recursive'
          fetch-depth: 1

      - name: Inject branding files
        run: |
          echo ${{ inputs.name }} > app_name.txt
          echo ${{ inputs.author }} > company_name.txt
          echo ${{ inputs.version_str }} > version.txt

      - name: Download custom icon
        if: inputs.image_url != ''
        run: curl -L "${{ inputs.image_url }}" -o app/moonlight.icns

      - name: Mark branding changes as unchanged for git
        run: |
          git update-index --assume-unchanged app_name.txt company_name.txt version.txt
          if [ -f app/moonlight.icns ]; then
            git update-index --assume-unchanged app/moonlight.icns
          fi

      - name: Import Apple Developer Certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Store Notarization Credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "ESportsNotary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

      - name: Install create-dmg
        run: |
          brew install node
          npm install --global create-dmg

      - name: Install Qt 6.7.3
        uses: jurplel/install-qt-action@v4
        with:
          cache: true
          version: 6.7.3
          modules: 'qtwebsockets qtmultimedia qt5compat qtshadertools'

      - name: Build DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARY_KEYCHAIN_PROFILE: "ESportsNotary"
        run: bash scripts/generate-dmg.sh Release

      - name: Upload DMG
        uses: actions/upload-artifact@v5
        with:
          name: ESports-macOS
          path: build/installer-Release/*.dmg
          compression-level: 0
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
